<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Robot Soccer Scoreboard</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;600&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }

body { background: #0a0e1a; }

#app {
  height: 100vh;
  background: #0a0e1a;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: 'Rajdhani', sans-serif;
}

.content {
  width: 100%;
  max-width: 1400px;
}

.title {
  text-align: center;
  font-family: 'Orbitron';
  font-size: 24px;
  letter-spacing: 4px;
  color: #4a9eff;
  margin-bottom: 2rem;
}

.scoreboard {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  margin-bottom: 2rem;
}

.team {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  padding: 3rem 2rem;
  border-radius: 12px;
}

.team-a {
  background: linear-gradient(135deg, #1a0a2e, #150822);
  border: 1px solid #5c2d9e;
}

.team-b {
  background: linear-gradient(135deg, #001a2e, #000f1e);
  border: 1px solid #1a5c9e;
}

.team-label {
  font-family: 'Orbitron';
  font-size: 22px;
  letter-spacing: 4px;
}

/* ✅ readable colors */
.team-a .team-label {
  color: #c084fc;
  text-shadow: 0 0 10px #a855f7;
}

.team-b .team-label {
  color: #38bdf8;
  text-shadow: 0 0 10px #38bdf8;
}

.score {
  font-family: 'Orbitron';
  font-size: 140px;
  font-weight: 900;
}

.team-a .score { color: #c084fc; }
.team-b .score { color: #38bdf8; }

.divider {
  font-family: 'Orbitron';
  font-size: 30px;
  color: #666;
  padding: 0 2rem;
}

.timer-display {
  font-family: 'Orbitron';
  font-size: 100px;
  text-align: center;
  color: white;
}

.timer-status {
  text-align: center;
  margin-top: 10px;
  color: #aaa;
  font-size: 18px;
}

.controls {
  display: flex;
  justify-content: center;
  margin-top: 20px;
}

.btn {
  padding: 12px 24px;
  font-size: 16px;
  margin: 5px;
  cursor: pointer;
  background: #111;
  color: white;
  border: 1px solid #555;
}

.key-hints {
  margin-top: 30px;
  display: flex;
  justify-content: center;
  gap: 25px;
  flex-wrap: wrap;
}

.key-hint {
  color: #aaa;
  font-size: 14px;
}

.key-badge {
  border: 1px solid #aaa;
  padding: 4px 8px;
  margin-right: 6px;
}
</style>
</head>

<body>

<div id="app">
  <div class="content">

    <div class="title">⚡ Robot Soccer ⚡</div>

    <div class="scoreboard">
      <div class="team team-a" title="Press A to score">
        <div class="team-label">Alpha</div>
        <div class="score" id="scoreA">0</div>
      </div>

      <div class="divider">VS</div>

      <div class="team team-b" title="Press B to score">
        <div class="team-label">Beta</div>
        <div class="score" id="scoreB">0</div>
      </div>
    </div>

    <div class="timer-display" id="timerDisplay">2:00</div>
    <div class="timer-status" id="timerStatus">PRESS S TO START</div>

    <div class="controls">
      <button class="btn" onclick="toggleTimer()">Start / Pause</button>
      <button class="btn" onclick="resetAll()">Reset</button>
    </div>

    <div class="key-hints">
      <div class="key-hint"><span class="key-badge">A</span> Score Alpha</div>
      <div class="key-hint"><span class="key-badge">S</span> Start / Pause</div>
      <div class="key-hint"><span class="key-badge">B</span> Score Beta</div>
      <div class="key-hint"><span class="key-badge">R</span> Reset</div>
    </div>

  </div>
</div>

<script>
const MATCH_DURATION = 120;
let scores = { a: 0, b: 0 };
let timeLeft = MATCH_DURATION;
let running = false;
let interval = null;

const scoreAEl = document.getElementById('scoreA');
const scoreBEl = document.getElementById('scoreB');
const timerEl = document.getElementById('timerDisplay');
const statusEl = document.getElementById('timerStatus');

function formatTime(s) {
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return m + ':' + String(sec).padStart(2, '0');
}

function updateTimer() {
  timerEl.textContent = formatTime(timeLeft);
}

function toggleTimer() {
  if (running) {
    clearInterval(interval);
    running = false;
    statusEl.textContent = 'PAUSED';
  } else {
    running = true;
    statusEl.textContent = 'RUNNING';
    interval = setInterval(() => {
      timeLeft--;
      updateTimer();
      if (timeLeft <= 0) {
        clearInterval(interval);
        statusEl.textContent = 'MATCH OVER';
      }
    }, 1000);
  }
}

function addScore(team) {
  scores[team]++;
  if (team === 'a') scoreAEl.textContent = scores.a;
  else scoreBEl.textContent = scores.b;
}

function resetAll() {
  clearInterval(interval);
  scores = { a: 0, b: 0 };
  timeLeft = MATCH_DURATION;
  running = false;
  scoreAEl.textContent = '0';
  scoreBEl.textContent = '0';
  updateTimer();
  statusEl.textContent = 'PRESS S TO START';
}

document.addEventListener('keydown', (e) => {
  const key = e.key.toLowerCase();

  if (key === 's') toggleTimer();
  else if (key === 'a') addScore('a');
  else if (key === 'b') addScore('b');
  else if (key === 'r') resetAll();
});

updateTimer();
</script>

</body>
</html>
